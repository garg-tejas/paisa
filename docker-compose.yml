# Local development convenience: a Postgres instance matching the backend's
# default DATABASE_URL (postgresql://postgres:postgres@localhost:5432/paisa).
# Migrations run automatically when the FastAPI app starts.
#
#   docker compose up -d db      # start Postgres in the background
#   docker compose down          # stop it (data persists in the volume)
#
# The optional `backend` service runs FastAPI against this DB. Comment it out
# if you prefer running uvicorn directly on the host.

services:
  db:
    image: postgres:16-alpine
    container_name: paisa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paisa
    ports:
      - "5432:5432"
    volumes:
      - paisa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paisa"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: run the FastAPI backend in a container too.
  backend:
    build: ./backend
    container_name: paisa-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network, reach Postgres by service name "db".
      DATABASE_URL: postgresql://postgres:postgres@db:5432/paisa
      GLM_API_KEY: ${GLM_API_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-admin@example.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PORT: "8000"
    ports:
      - "8000:8000"
    profiles:
      - full   # only starts with: docker compose --profile full up

volumes:
  paisa-pgdata:
